name: Publish GCP Bundle

# This workflow publishes GCP bundles to GCS using OIDC authentication.
#
# Required GitHub Secrets:
#   - GCP_SERVICE_ACCOUNT: Service account email (e.g., gh-actions@example-project.iam.gserviceaccount.com)
#   - GCP_WORKLOAD_IDENTITY_PROVIDER: Full provider path (e.g., projects/123456789/locations/global/workloadIdentityPools/github-actions/providers/github)
#
# Security:
#   - Uses OIDC authentication (no long-lived credentials)
#   - OIDC provider validates repository_owner == 'Worklytics'
#   - workflow_dispatch requires write access (enforced by GitHub)
#   - Tag pushes require push access (enforced by GitHub)
#   - RC branch pushes require write access (enforced by GitHub)
#   - Consider adding branch protection rules to restrict who can push tags and create rc-* branches

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - 'rc-*'

env:
  IMPLEMENTATION: gcp
  JAVA_SOURCE_ROOT: java/
  BUCKET_NAME: psoxy-public-artifacts
  JAR_NAME: psoxy-gcp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build and Publish GCP Bundle
    runs-on: ubuntu-latest
    # Security: Only run on authorized triggers
    # - Tags (v*): Regular releases, anyone with push access can create tags
    # - RC branches (rc-*): Release candidates, requires write access (includes PR merges)
    # - workflow_dispatch: Manual trigger, requires write access (checked in step below)
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Verify authorization for manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          # For manual triggers, verify the user has write access to the repository
          # This prevents unauthorized users from triggering the workflow
          # Note: GitHub's OIDC provider already validates repository_owner == 'Worklytics'
          # but we add an extra check here for defense in depth
          
          # Check if actor is a member of the organization or has write access
          # This is a basic check - GitHub will also enforce permissions
          if [ "${{ github.event.sender.type }}" != "User" ] && [ "${{ github.event.sender.type }}" != "Bot" ]; then
            echo "❌ ERROR: Unauthorized trigger. Only users and bots can trigger this workflow."
            exit 1
          fi
          
          echo "✓ Authorized trigger by: ${{ github.event.sender.login }}"
          echo "  Actor type: ${{ github.event.sender.type }}"
          echo "  Repository: ${{ github.repository }}"
          echo ""
          echo "Note: This workflow requires write access to the repository."
          echo "GitHub will enforce this permission check before allowing the workflow to run."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        run: |
          # Install jq if not already available
          sudo apt-get update && sudo apt-get install -y jq

      - name: Publish GCP Bundle
        id: publish
        run: |
          # Determine if RC build; assume it is UNLESS ref is tag starting with v (e.g., v0.5.15)
          RC_OPTION="--rc"
          REF_NAME="${{ github.ref_name }}"
          if [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            RC_OPTION=""
          fi
          
          ./tools/release/lib/publish-gcp-bundle.sh --non-interactive $RC_OPTION | tee publish-output.log
          
          # Extract artifact URI and SHA256 from output
          ARTIFACT_URI=$(grep "^ARTIFACT_URI=" publish-output.log | cut -d'=' -f2- || echo "")
          ARTIFACT_SHA256=$(grep "^ARTIFACT_SHA256=" publish-output.log | cut -d'=' -f2- || echo "")
          if [ -n "$ARTIFACT_URI" ]; then
            echo "artifact_uri=$ARTIFACT_URI" >> $GITHUB_OUTPUT
          fi
          if [ -n "$ARTIFACT_SHA256" ]; then
            echo "artifact_sha256=$ARTIFACT_SHA256" >> $GITHUB_OUTPUT
          fi

      - name: Amend GitHub Release with Artifact References
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          ARTIFACT_URI="${{ steps.publish.outputs.artifact_uri }}"
          ARTIFACT_SHA256="${{ steps.publish.outputs.artifact_sha256 }}"
          
          if [ -z "$ARTIFACT_URI" ]; then
            echo "❌ ERROR: No Artifact URI found."
            exit 1
          fi
          
          # Convert gs:// URI to HTTP URL
          HTTP_URL=$(echo "$ARTIFACT_URI" | sed 's|^gs://|https://storage.googleapis.com/|')
          
          IDENTIFIER="<!-- gcp-artifacts-info -->"
          
          # Construct the block to append
          BLOCK=$(cat <<EOF
          
          $IDENTIFIER
          ## GCP Deployment Bundle
          * **GCS URI:** \`$ARTIFACT_URI\`
          * **HTTP URL:** [$HTTP_URL]($HTTP_URL)
          * **SHA256 Hash:** \`$ARTIFACT_SHA256\`
          $IDENTIFIER
          EOF
          )
          
          # Retry loop to handle potential concurrent edits with AWS workflow
          for i in {1..5}; do
            echo "Fetching latest release body..."
            current_body=$(gh release view "$TAG_NAME" --json body -q '.body')
            
            # Check if GCP info already exists
            if [[ "$current_body" == *"$IDENTIFIER"* ]]; then
              echo "Release already contains GCP artifact references. Replacing block..."
              new_body=$(IDENTIFIER="$IDENTIFIER" python3 -c '
import sys, os
identifier = os.environ["IDENTIFIER"]
body = sys.stdin.read()
parts = body.split(identifier)
if len(parts) >= 3:
    sys.stdout.write(parts[0] + parts[2])
else:
    sys.stdout.write(body)
' <<< "$current_body")
            else
              new_body="$current_body"
            fi
            
            # Append new block
            new_body=$(printf "%s\n%s" "$new_body" "$BLOCK")
            
            echo "Updating release body on GitHub..."
            if gh release edit "$TAG_NAME" --notes "$new_body"; then
              echo "✅ Successfully updated release body!"
              break
            fi
            
            sleep_time=$((RANDOM % 5 + 2))
            echo "Failed to update release, retrying in $sleep_time seconds..."
            sleep $sleep_time
          done

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Successfully published GCP bundle" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.publish.outputs.artifact_uri }}" ]; then
            echo "**Artifact URI:** \`${{ steps.publish.outputs.artifact_uri }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Artifact has been published to GCS." >> $GITHUB_STEP_SUMMARY
