name: CI - bundles

# CI for our project as a GitHub action
# see https://help.github.com/en/actions/language-and-framework-guides/building-and-testing-java-with-maven

# refactor to use matrix?
# see https://github.com/actions/setup-java#testing-against-different-java-versions

on:
  push: # mainline + rc's only
    branches:
      - 'main'
      - 'rc-*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        implementation: [ 'gcp', 'aws' ]
    name: bundle ${{ matrix.implementation }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: zulu
      - name: Package Deployment artifact
        working-directory: java/
        # see tools/build.sh; this should be equivalent to that, w/o re-routing errors to log file
        # or logic to skip build if artifact already exists
        run: |
          mvn clean -f pom.xml
          mvn package install -f "gateway-core/pom.xml" -Dmaven.test.skip=true
          mvn package install -f "core/pom.xml" -Dmaven.test.skip=true
          mvn package   -Pdistribution -f "impl/${{ matrix.implementation }}/pom.xml"
      - name: Verify license artifacts are in the uber jar
        working-directory: java/impl/${{ matrix.implementation }}
        run: |
          # Select the shaded uber JAR, excluding the original pre-shade JAR
          JAR_FILE=$(find target -name "*.jar" ! -name "original-*" | head -n1)

          echo "Inspecting $JAR_FILE for required license files"

          unzip -l "$JAR_FILE" | tee jar-contents.txt

          # Check summary file
          grep -q 'THIRD-PARTY-LICENSE-LIST.txt' jar-contents.txt || {
            echo "::error::Missing THIRD-PARTY-LICENSE-LIST.txt in $JAR_FILE"
            exit 1
          }

          # Check for at least one LICENSE or NOTICE file at root
          # grep -Eq '/(LICENSE|NOTICE)$' jar-contents.txt || {
          #   echo "::error::Missing LICENSE or NOTICE at root of $JAR_FILE"
          #   exit 1
          # }

          # Check for individual license text files from dependencies
          grep -qE '^ *[0-9].*(license|LICENSE).*\.txt' jar-contents.txt || {
            echo "::error::No license texts from dependencies found in $JAR_FILE"
            exit 1
          }

          echo "✅ License artifacts verified in $JAR_FILE"
      - name: Configure AWS credentials via OIDC
        if: matrix.implementation == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::908404960471:role/GithubActionCIAgent
          aws-region: us-west-2
      - name: Upload uber-jar to S3
        if: matrix.implementation == 'aws'
        working-directory: java/impl/aws/target/
        env:
          AWS_REGION: us-west-2
          S3_BUCKET: psoxy-public-artifacts
        run: |
          # uber-jar should be something like: psoxy-aws-{VERSION}.jar
          JAR_FILE=$(find . -name "*.jar" ! -name "original-*" | head -n1) 
          
          JAR_HASH=$(openssl dgst -sha256 -binary "$JAR_FILE" | openssl base64 | tr -d '\n')
          echo "Bundle Hash: $JAR_HASH"
          echo "Uploading $JAR_FILE to s3://$S3_BUCKET/"

          aws s3 cp "$JAR_FILE" "s3://$S3_BUCKET/" --metadata bundle_hash="$JAR_HASH" --region "$AWS_REGION"
