name: 'terrafrom-sec-analysis'

on:
  push:
    branches:
      - '**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tfsec:
    strategy:
      matrix:
        example_path: [
          'examples-dev/aws',
          'examples-dev/gcp',
        ]
    uses: ./.github/workflows/terraform-sec-analysis.yaml
    with:
      example_path: ${{ matrix.example_path }}
