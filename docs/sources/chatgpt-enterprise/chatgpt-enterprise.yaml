---
endpoints:
  - pathTemplate: "/v1/compliance/workspaces/{workspaceId}/automations"
    allowedQueryParams:
      - "after"
      - "limit"
    transforms:
      - !<textDigest>
        jsonPaths:
          - "$.data[*].title"
          - "$.data[*].prompt"
    responseSchema:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/definitions/ExportAutomation"
        has_more:
          type: "boolean"
        last_end_time:
          type: "string"
          format: "date-time"
        last_id:
          type: "string"
        object:
          type: "string"
  - pathTemplate: "/v1/compliance/workspaces/{workspaceId}/logs"
    allowedQueryParams:
      - "event_type"
      - "limit"
      - "after"
      - "before"
    responseSchema:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/definitions/LogFile"
        has_more:
          type: "boolean"
        last_end_time:
          type: "string"
          format: "date-time"
        last_id:
          type: "string"
        object:
          type: "string"
  - pathTemplate: "/v1/compliance/workspaces/{workspaceId}/logs/{logFileId}"
    allowedQueryParams: []
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$.principal.id"
          - "$..email"
          - "$..user_id"
          - "$..user_email"
        encoding: "URL_SAFE_TOKEN"
      - !<redactExceptPhrases>
        jsonPaths:
          - "$.conversation.title"
          - "$.message.content.value"
          - "$.message.annotations[*].quote_text"
        allowedPhrases:
          - "python"
          - "javascript"
          - "typescript"
          - "java"
          - "sql"
          - "html"
          - "react"
          - "bash"
          - "css"
          - "docker"
          - "ruby"
          - "golang"
          - "kotlin"
          - "php"
          - "node"
          - "angular"
          - "vue"
          - "swift"
          - "npm"
          - "github"
          - "git"
          - "function"
          - "error"
          - "api"
          - "debug"
          - "implement"
          - "bug"
          - "deploy"
          - "script"
          - "class"
          - "method"
          - "array"
          - "exception"
          - "refactor"
          - "compile"
          - "callback"
          - "const"
          - "async"
          - "await"
          - "pull request"
          - "code review"
          - "unit test"
          - "stack trace"
          - "pivot table"
          - "bar chart"
          - "line chart"
          - "pie chart"
          - "data analysis"
          - "vlookup"
          - "financials"
          - "accounting"
          - "payroll"
          - "breakeven"
          - "cashflow"
          - "nps"
          - "tableau"
          - "snowflake"
          - "email"
          - "e-mail"
          - "mail"
          - "write"
          - "draft"
          - "compose"
          - "craft"
          - "design"
          - "draw"
          - "rewrite"
          - "proofread"
          - "redline"
          - "review"
          - "summarize"
          - "summarise"
          - "summary"
          - "translate to"
          - "report"
          - "proposal"
          - "blog"
          - "article"
          - "presentation"
          - "slides"
          - "brief"
          - "newsletter"
          - "linkedin"
          - "memo"
          - "deck"
          - "outline"
          - "contract"
          - "nda"
          - "what is"
          - "what are"
          - "how does"
          - "how do"
          - "how to"
          - "explain how"
          - "explain why"
          - "explain what"
          - "why does"
          - "why is"
          - "difference between"
          - "best practices"
          - "compared to"
          - "brainstorm"
          - "alternatives"
          - "versus"
          - "tradeoffs"
    responseSchema:
      type: "object"
      properties:
        actor:
          $ref: "#/definitions/Actor"
        conversation:
          $ref: "#/definitions/Conversation"
        event_id:
          type: "string"
        message:
          $ref: "#/definitions/LogMessage"
        principal:
          $ref: "#/definitions/Principal"
        timestamp:
          type: "string"
          format: "date-time"
        type:
          type: "string"
  - pathTemplate: "/v1/compliance/workspaces/{workspaceId}/projects"
    allowedQueryParams:
      - "after"
      - "limit"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$.data[*].owner_email"
          - "$.data[*].owner_id"
          - "$..email"
          - "$.data[*].sharing.recipients[*].id"
        encoding: "URL_SAFE_TOKEN"
      - !<redact>
        jsonPaths:
          - "$.data[*].latest_config[*].name"
          - "$.data[*].latest_config[*].description"
      - !<textDigest>
        jsonPaths:
          - "$..conversation_starters[*]"
          - "$..instructions"
    responseSchema:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/definitions/Project"
        has_more:
          type: "boolean"
        last_end_time:
          type: "string"
          format: "date-time"
        last_id:
          type: "string"
        object:
          type: "string"
  - pathTemplate: "/v1/compliance/workspaces/{workspaceId}/users"
    allowedQueryParams:
      - "after"
      - "limit"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$.data[*].email"
        encoding: "URL_SAFE_TOKEN"
      - !<pseudonymize>
        jsonPaths:
          - "$.data[*].id"
        includeReversible: true
        encoding: "URL_SAFE_TOKEN"
      - !<redact>
        jsonPaths:
          - "$.data[*].display_name"
    responseSchema:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/definitions/WorkspaceUser"
        has_more:
          type: "boolean"
        last_end_time:
          type: "string"
          format: "date-time"
        last_id:
          type: "string"
        object:
          type: "string"
definitions:
  Actor:
    type: "object"
    properties:
      type:
        type: "string"
      user_email:
        type: "string"
      user_id:
        type: "string"
  Annotation:
    type: "object"
    properties:
      id:
        type: "string"
      quote_text:
        type: "string"
      type:
        type: "string"
  Author:
    type: "object"
    properties:
      client_type:
        type: "string"
      type:
        type: "string"
  BaseFile:
    type: "object"
    properties:
      created_at:
        type: "number"
      id:
        type: "string"
      object:
        type: "string"
  Content:
    type: "object"
    properties:
      type:
        type: "string"
      value:
        type: "string"
  Conversation:
    type: "object"
    properties:
      created_at:
        type: "string"
        format: "date-time"
      id:
        type: "string"
      is_pinned:
        type: "boolean"
      is_temporary_chat:
        type: "boolean"
      title:
        type: "string"
  ExportAutomation:
    type: "object"
    properties:
      id:
        type: "string"
      is_enabled:
        type: "boolean"
      prompt:
        type: "string"
      schedule:
        type: "string"
  LogFile:
    type: "object"
    properties:
      id:
        type: "string"
  LogMessage:
    type: "object"
    properties:
      annotations:
        type: "array"
        items:
          $ref: "#/definitions/Annotation"
      author:
        $ref: "#/definitions/Author"
      content:
        $ref: "#/definitions/Content"
      files:
        type: "array"
        items:
          $ref: "#/definitions/BaseFile"
      id:
        type: "string"
      parent_id:
        type: "string"
  Permissions:
    type: "object"
    properties:
      can_read:
        type: "boolean"
      can_view_config:
        type: "boolean"
      can_write:
        type: "boolean"
      object:
        type: "string"
  Principal:
    type: "object"
    properties:
      id:
        type: "string"
      type:
        type: "string"
  Project:
    type: "object"
    properties:
      builder_name:
        type: "string"
      created_at:
        type: "number"
      id:
        type: "string"
      latest_config:
        type: "array"
        items:
          $ref: "#/definitions/ProjectConfig"
      object:
        type: "string"
      owner_email:
        type: "string"
      owner_id:
        type: "string"
      sharing:
        $ref: "#/definitions/Sharing"
  ProjectConfig:
    type: "object"
    properties:
      categories:
        type: "array"
        items:
          type: "string"
      conversation_starters:
        type: "array"
        items:
          type: "string"
      created_at:
        type: "number"
      files:
        type: "array"
        items:
          $ref: "#/definitions/BaseFile"
      id:
        type: "string"
      instructions:
        type: "string"
      object:
        type: "string"
      tools:
        type: "array"
        items:
          $ref: "#/definitions/ProjectTool"
  ProjectTool:
    type: "object"
    properties:
      action_domain:
        type: "string"
      created_at:
        type: "number"
      type:
        type: "string"
  Recipient:
    type: "object"
    properties:
      email:
        type: "string"
      id:
        type: "string"
      object:
        type: "string"
      permissions:
        $ref: "#/definitions/Permissions"
  Sharing:
    type: "object"
    properties:
      object:
        type: "string"
      permissions:
        $ref: "#/definitions/Permissions"
      recipients:
        type: "array"
        items:
          $ref: "#/definitions/Recipient"
      visibility:
        type: "string"
  WorkspaceUser:
    type: "object"
    properties:
      created_at:
        type: "number"
      email:
        type: "string"
      id:
        type: "string"
      object:
        type: "string"
      role:
        type: "string"
      status:
        type: "string"
