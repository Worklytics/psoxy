definitions:
  BaseFile:
    type: "object"
    properties:
      created_at:
        type: "number"
      id:
        type: "string"
      object:
        type: "string"
  Conversation:
    type: "object"
    properties:
      created_at:
        type: "number"
      id:
        type: "string"
      last_active_at:
        type: "number"
      messages:
        $ref: "#/definitions/MessageList"
      object:
        type: "string"
      title:
        type: "string"
      user_email:
        type: "string"
      user_id:
        type: "string"
      workspace_id:
        type: "string"
  ExportAutomation:
    type: "object"
    properties:
      id:
        type: "string"
      is_enabled:
        type: "boolean"
      prompt:
        type: "string"
      schedule:
        type: "string"
  Message:
    type: "object"
    properties:
      author:
        $ref: "#/definitions/MessageAuthor"
      content:
        $ref: "#/definitions/MessageContent"
      created_at:
        type: "number"
      files:
        type: "array"
        items:
          $ref: "#/definitions/BaseFile"
      gpt_id:
        type: "string"
      id:
        type: "string"
      object:
        type: "string"
      parent_id:
        type: "string"
      project_id:
        type: "string"
  MessageAuthor:
    type: "object"
    properties:
      object:
        type: "string"
      role:
        type: "string"
      tool_name:
        type: "string"
  MessageContent:
    type: "object"
    properties:
      object:
        type: "string"
      type:
        type: "string"
      value:
        type: "string"
  MessageList:
    type: "object"
    properties:
      data:
        type: "array"
        items:
          $ref: "#/definitions/Message"
      has_more:
        type: "boolean"
      last_id:
        type: "string"
      object:
        type: "string"
  Permissions:
    type: "object"
    properties:
      can_read:
        type: "boolean"
      can_view_config:
        type: "boolean"
      can_write:
        type: "boolean"
      object:
        type: "string"
  Project:
    type: "object"
    properties:
      builder_name:
        type: "string"
      created_at:
        type: "number"
      id:
        type: "string"
      latest_config:
        type: "array"
        items:
          $ref: "#/definitions/ProjectConfig"
      object:
        type: "string"
      owner_email:
        type: "string"
      owner_id:
        type: "string"
      sharing:
        $ref: "#/definitions/Sharing"
  ProjectConfig:
    type: "object"
    properties:
      categories:
        type: "array"
        items:
          type: "string"
      conversation_starters:
        type: "array"
        items:
          type: "string"
      created_at:
        type: "number"
      files:
        type: "array"
        items:
          $ref: "#/definitions/BaseFile"
      id:
        type: "string"
      instructions:
        type: "string"
      object:
        type: "string"
      tools:
        type: "array"
        items:
          $ref: "#/definitions/ProjectTool"
  ProjectTool:
    type: "object"
    properties:
      action_domain:
        type: "string"
      created_at:
        type: "number"
      type:
        type: "string"
  Recipient:
    type: "object"
    properties:
      email:
        type: "string"
      id:
        type: "string"
      object:
        type: "string"
      permissions:
        $ref: "#/definitions/Permissions"
  Sharing:
    type: "object"
    properties:
      object:
        type: "string"
      permissions:
        $ref: "#/definitions/Permissions"
      recipients:
        type: "array"
        items:
          $ref: "#/definitions/Recipient"
      visibility:
        type: "string"
  WorkspaceUser:
    type: "object"
    properties:
      created_at:
        type: "number"
      email:
        type: "string"
      id:
        type: "string"
      object:
        type: "string"
      role:
        type: "string"
      status:
        type: "string"
