fileRules:
  /{date}/{table}/{file}.csv{compression?}:
    columnsToPseudonymize:
      - "EMAIL_ADDRESS"
      - "USER_ID"
      - "MANAGER_ID"
      - "CRM_USER_ID"
      - "SUBMIT_BY_USER_ID"
      - "GAVE_SCORECARD_USER_ID"
      - "RECEIVED_SCORECARD_USER_ID"
      - "QUESTION_MODIFIED_BY_USER_ID"
      - "SCORECARD_MODIFIED_BY_USER_ID"
    columnsToRedact:
      - "FIRST_NAME"
      - "LAST_NAME"
      - "TITLE"
      - "NOTES"
      - "USER_NAME"
      - "CALL_OWNER"
      - "COMMENT"
      - "ANSWER_TEXT"
      - "MENTIONS"
