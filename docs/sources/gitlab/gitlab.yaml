      user_notes_count:
        type: "integer"
      work_in_progress:
        type: "boolean"
  Milestone:
    type: "object"
    properties:
      created_at:
        type: "string"
        format: "date-time"
      description:
        type: "string"
      due_date:
        type: "string"
        format: "date"
      expired:
        type: "boolean"
      group_id:
        type: "integer"
      id:
        type: "integer"
      iid:
        type: "integer"
      project_id:
        type: "integer"
