---
endpoints:
  - pathTemplate: "/api/v4/audit_events"
    allowedQueryParams: []
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$.author_id"
          - "$[*].author_id"
          - "$[*].details.author_email"
          - "$[*].details.ip_address"
          - "$[*].details.from"
          - "$[*].details.to"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/AuditEvent"
  - pathTemplate: "/api/v4/groups"
    allowedQueryParams:
      - "order_by"
      - "sort"
      - "search"
      - "top_level_only"
      - "all_available"
      - "per_page"
      - "page"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Group"
  - pathTemplate: "/api/v4/groups/{id}/members"
    allowedQueryParams: []
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].id"
          - "$[*].username"
          - "$[*].email"
          - "$[*].created_by.id"
          - "$[*].created_by.username"
          - "$[*].group_saml_identity.extern_uid"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/GroupMember"
  - pathTemplate: "/api/v4/issues"
    allowedQueryParams:
      - "state"
      - "updated_after"
      - "updated_before"
      - "created_after"
      - "created_before"
      - "scope"
      - "order_by"
      - "sort"
      - "per_page"
      - "page"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author.id"
          - "$[*]..username"
          - "$[*].assignee.id"
          - "$[*].assignees[*].id"
          - "$[*].closed_by.id"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..description"
          - "$..title"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Issue"
  - pathTemplate: "/api/v4/merge_requests"
    allowedQueryParams:
      - "state"
      - "updated_after"
      - "updated_before"
      - "created_after"
      - "created_before"
      - "scope"
      - "order_by"
      - "sort"
      - "per_page"
      - "page"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author.id"
          - "$[*]..username"
          - "$[*].assignee.id"
          - "$[*].assignees[*].id"
          - "$[*].reviewers[*].id"
          - "$[*].merged_by.id"
          - "$[*].merge_user.id"
          - "$[*].closed_by.id"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..title"
          - "$..description"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/MergeRequest"
  - pathTemplate: "/api/v4/merge_requests/{id}"
    allowedQueryParams: []
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author.id"
          - "$..username"
          - "$..assignee.id"
          - "$..assignees[*].id"
          - "$..reviewers[*].id"
          - "$..merged_by.id"
          - "$..merge_user.id"
          - "$..closed_by.id"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..title"
          - "$..description"
    responseSchema:
      type: "object"
      properties:
        allow_collaboration:
          type: "boolean"
        allow_maintainer_to_push:
          type: "boolean"
        assignee:
          $ref: "#/definitions/User"
        assignees:
          type: "array"
          items:
            $ref: "#/definitions/User"
        author:
          $ref: "#/definitions/User"
        blocking_discussions_resolved:
          type: "boolean"
        changes_count:
          type: "integer"
        closed_at:
          type: "string"
          format: "date-time"
        closed_by:
          $ref: "#/definitions/User"
        created_at:
          type: "string"
          format: "date-time"
        description:
          type: "string"
        detailed_merge_status:
          type: "string"
        diff_refs:
          $ref: "#/definitions/DiffRefs"
        discussion_locked:
          type: "boolean"
        downvotes:
          type: "integer"
        draft:
          type: "boolean"
        force_remove_source_branch:
          type: "boolean"
        has_conflicts:
          type: "boolean"
        id:
          type: "integer"
        iid:
          type: "integer"
        merge_commit_sha:
          type: "string"
        merge_status:
          type: "string"
        merge_user:
          $ref: "#/definitions/User"
        merge_when_pipeline_succeeds:
          type: "boolean"
        merged_at:
          type: "string"
          format: "date-time"
        merged_by:
          $ref: "#/definitions/User"
        milestone:
          $ref: "#/definitions/Milestone"
        overflow:
          type: "boolean"
        project_id:
          type: "integer"
        reviewers:
          type: "array"
          items:
            $ref: "#/definitions/User"
        sha:
          type: "string"
        should_remove_source_branch:
          type: "boolean"
        sourceId:
          type: "string"
        source_branch:
          type: "string"
        source_project_id:
          type: "integer"
        squash:
          type: "boolean"
        squash_commit_sha:
          type: "string"
        squash_on_merge:
          type: "boolean"
        state:
          type: "string"
        target_branch:
          type: "string"
        target_project_id:
          type: "integer"
        task_completion_status:
          $ref: "#/definitions/TaskCompletionStatus"
        time_stats:
          $ref: "#/definitions/TimeStats"
        title:
          type: "string"
        updated_at:
          type: "string"
          format: "date-time"
        upvotes:
          type: "integer"
        user_notes_count:
          type: "integer"
        work_in_progress:
          type: "boolean"
  - pathTemplate: "/api/v4/projects"
    allowedQueryParams:
      - "page"
      - "per_page"
      - "archived"
      - "visibility"
      - "order_by"
      - "sort"
      - "search"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..creator_id"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Project"
  - pathTemplate: "/api/v4/projects/{id}/issues/{issueIid}/notes"
    allowedQueryParams:
      - "sort"
      - "per_page"
      - "page"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author.id"
          - "$..author.username"
          - "$..author.email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..body"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Note"
  - pathTemplate: "/api/v4/projects/{id}/issues/{issueIid}/resource_state_events"
    allowedQueryParams:
      - "per_page"
      - "page"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].user.id"
          - "$[*].user.username"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/StateEvent"
  - pathTemplate: "/api/v4/projects/{id}/merge_requests/{mergeRequestIid}/commits"
    allowedQueryParams:
      - "id"
      - "merge_request_iid"
      - "per_page"
      - "page"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author_email"
          - "$[*].committer_email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$[*].message"
          - "$[*].title"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Commit"
  - pathTemplate: "/api/v4/projects/{id}/merge_requests/{mergeRequestIid}/notes"
    allowedQueryParams:
      - "sort"
      - "per_page"
      - "page"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author.id"
          - "$[*].author.username"
          - "$[*].author.email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..body"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Note"
  - pathTemplate: "/api/v4/projects/{id}/merge_requests/{mergeRequestIid}/resource_state_events"
    allowedQueryParams:
      - "per_page"
      - "page"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].user.id"
          - "$[*].user.username"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/StateEvent"
  - pathTemplate: "/api/v4/projects/{id}/repository/branches"
    allowedQueryParams:
      - "id"
      - "per_page"
      - "page"
      - "search"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author_email"
          - "$..committer_email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..message"
          - "$..title"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Branch"
  - pathTemplate: "/api/v4/projects/{id}/repository/commits"
    allowedQueryParams:
      - "ref_name"
      - "since"
      - "until"
      - "with_stats"
      - "first_parent"
      - "order"
      - "all"
      - "per_page"
      - "page"
      - "trailers"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author_email"
          - "$..committer_email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..message"
          - "$..title"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Commit"
  - pathTemplate: "/api/v4/projects/{id}/repository/commits/{sha}"
    allowedQueryParams:
      - "id"
      - "sha"
      - "stats"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author_email"
          - "$..committer_email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..message"
          - "$..title"
    responseSchema:
      type: "object"
      properties:
        author_email:
          type: "string"
        authored_date:
          type: "string"
          format: "date-time"
        committed_date:
          type: "string"
          format: "date-time"
        committer_email:
          type: "string"
        created_at:
          type: "string"
          format: "date-time"
        id:
          type: "string"
        message:
          type: "string"
        parent_ids:
          type: "array"
          items:
            type: "string"
        project_id:
          type: "integer"
        short_id:
          type: "string"
        sourceId:
          type: "string"
        stats:
          $ref: "#/definitions/Stats"
        status:
          type: "string"
        title:
          type: "string"
  - pathTemplate: "/api/v4/projects/{id}/repository/commits/{sha}/comments"
    allowedQueryParams:
      - "per_page"
      - "page"
      - "id"
      - "sha"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author.id"
          - "$[*].author.username"
          - "$[*].author.email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$[*].note"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/CommitComment"
  - pathTemplate: "/api/v4/projects/{id}/repository/commits/{sha}/discussions"
    allowedQueryParams:
      - "per_page"
      - "page"
      - "id"
      - "sha"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].notes[*].author.id"
          - "$[*]..username"
          - "$[*]..email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$[*]..body"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/CommitDiscussion"
  - pathTemplate: "/api/v4/users"
    allowedQueryParams:
      - "state"
      - "order_by"
      - "sort"
      - "search"
      - "per_page"
      - "page"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].id"
          - "$[*].username"
          - "$[*].email"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/User"
