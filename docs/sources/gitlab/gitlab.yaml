        type: "string"
      squash_on_merge:
        type: "boolean"
      state:
        type: "string"
      target_branch:
        type: "string"
      target_project_id:
        type: "integer"
      task_completion_status:
        $ref: "#/definitions/TaskCompletionStatus"
      time_stats:
        $ref: "#/definitions/TimeStats"
      title:
        type: "string"
      updated_at:
        type: "string"
        format: "date-time"
      upvotes:
