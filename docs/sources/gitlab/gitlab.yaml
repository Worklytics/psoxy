---
endpoints:
  - pathTemplate: "/api/v4/groups"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Group"
  - pathTemplate: "/api/v4/groups/{id}/members/all"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].id"
          - "$[*].username"
          - "$[*].email"
          - "$[*].created_by.id"
          - "$[*].created_by.username"
          - "$[*].group_saml_identity.extern_uid"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/GroupMember"
  - pathTemplate: "/api/v4/merge_requests/{id}"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author.id"
          - "$..username"
          - "$..assignee.id"
          - "$..assignees[*].id"
          - "$..reviewers[*].id"
          - "$..merged_by.id"
          - "$..merge_user.id"
          - "$..closed_by.id"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..title"
          - "$..description"
    responseSchema:
      type: "object"
      properties:
        assignee:
          $ref: "#/definitions/User"
        assignees:
          type: "array"
          items:
            $ref: "#/definitions/User"
        author:
          $ref: "#/definitions/User"
        blocking_discussions_resolved:
          type: "boolean"
        changes_count:
          type: "integer"
        closed_at:
          type: "string"
          format: "date-time"
        closed_by:
          $ref: "#/definitions/User"
        created_at:
          type: "string"
          format: "date-time"
        description:
          type: "string"
        detailed_merge_status:
          type: "string"
        diff_refs:
          $ref: "#/definitions/DiffRefs"
        discussion_locked:
          type: "boolean"
        downvotes:
          type: "integer"
        draft:
          type: "boolean"
        has_conflicts:
          type: "boolean"
        id:
          type: "integer"
        iid:
          type: "integer"
        merge_commit_sha:
          type: "string"
        merge_user:
          $ref: "#/definitions/User"
        merged_at:
          type: "string"
          format: "date-time"
        merged_by:
          $ref: "#/definitions/User"
        milestone:
          $ref: "#/definitions/Milestone"
        overflow:
          type: "boolean"
        project_id:
          type: "integer"
        reviewers:
          type: "array"
          items:
            $ref: "#/definitions/User"
        sha:
          type: "string"
        should_remove_source_branch:
          type: "boolean"
        sourceId:
          type: "string"
        source_branch:
          type: "string"
        source_project_id:
          type: "integer"
        squash:
          type: "boolean"
        squash_commit_sha:
          type: "string"
        squash_on_merge:
          type: "boolean"
        state:
          type: "string"
        target_branch:
          type: "string"
        target_project_id:
          type: "integer"
        task_completion_status:
          $ref: "#/definitions/TaskCompletionStatus"
        time_stats:
          $ref: "#/definitions/TimeStats"
        title:
          type: "string"
        updated_at:
          type: "string"
          format: "date-time"
        upvotes:
          type: "integer"
        user_notes_count:
          type: "integer"
        work_in_progress:
          type: "boolean"
  - pathTemplate: "/api/v4/projects"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..creator_id"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..description"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Project"
  - pathTemplate: "/api/v4/projects/{id}/audit_events"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$.author_id"
          - "$[*].author_id"
          - "$[*].details.author_email"
          - "$[*].details.from"
          - "$[*].details.to"
        encoding: "URL_SAFE_TOKEN"
      - !<hashIp>
        jsonPaths:
          - "$[*].details.ip_address"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/AuditEvent"
  - pathTemplate: "/api/v4/projects/{id}/issues/{issueIid}/notes"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author.id"
          - "$[*].author.username"
          - "$[*].author.email"
        encoding: "URL_SAFE_TOKEN"
      - !<redactExceptPhrases>
        jsonPaths:
          - "$[?(@.system==true)].body"
        allowedPhrases:
          - "closed via commit"
          - "closed via merge request"
          - "moved to"
          - "cloned to"
          - "marked this issue as a duplicate of"
          - "marked"
          - "as a duplicate of this issue"
          - "created task"
          - "resolved all threads"
          - "resolved all discussions"
          - "to continue this discussion"
          - "label"
          - "assigned to"
          - "unassigned"
          - "changed title from"
          - "changed the description"
          - "changed time estimate to"
          - "removed the time estimate"
          - "added"
          - "closed"
          - "of time spent"
          - "subtracted"
          - "removed time spent"
          - "changed due date to"
          - "removed the due date"
          - "locked this issue"
          - "unlocked this issue"
          - "made the issue confidential"
          - "made the issue visible to everyone"
          - "mentioned in commit"
          - "mentioned in merge request"
          - "mentioned in issue"
      - !<textDigest>
        jsonPaths:
          - "$[?(!@.system)].body"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Note"
  - pathTemplate: "/api/v4/projects/{id}/issues/{issueIid}/resource_state_events"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].user.id"
          - "$[*].user.username"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/StateEvent"
  - pathTemplate: "/api/v4/projects/{id}/merge_requests/{mergeRequestIid}/commits"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author_email"
          - "$[*].committer_email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$[*].message"
          - "$[*].title"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Commit"
  - pathTemplate: "/api/v4/projects/{id}/merge_requests/{mergeRequestIid}/notes"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author.id"
          - "$[*].author.username"
          - "$[*].author.email"
        encoding: "URL_SAFE_TOKEN"
      - !<redactExceptPhrases>
        jsonPaths:
          - "$[?(@.system==true)].body"
        allowedPhrases:
          - "approved this merge request"
          - "unapproved this merge request"
          - "requested changes to this merge request"
          - "removed the change request for this merge request"
          - "merged"
          - "requested review from"
          - "removed review request for"
          - "marked this merge request as ready"
          - "marked this merge request as"
          - "draft"
          - "closed"
          - "changed target branch from"
          - "enabled automatic merge"
          - "canceled the automatic merge"
          - "commit"
          - "commits"
          - "resolved all threads"
          - "resolved all discussions"
          - "to continue this discussion"
          - "label"
          - "assigned to"
          - "unassigned"
          - "changed title from"
          - "changed the description"
          - "changed time estimate to"
          - "removed the time estimate"
          - "of time spent"
          - "subtracted"
          - "removed time spent"
          - "changed due date to"
          - "removed the due date"
          - "locked this merge request"
          - "unlocked this merge request"
          - "made the issue confidential"
          - "made the issue visible to everyone"
          - "marked the checklist item"
          - "mentioned in commit"
          - "mentioned in merge request"
          - "mentioned in issue"
      - !<textDigest>
        jsonPaths:
          - "$[?(@.system!=true)].body"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Note"
  - pathTemplate: "/api/v4/projects/{id}/merge_requests/{mergeRequestIid}/resource_state_events"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].user.id"
          - "$[*].user.username"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/StateEvent"
  - pathTemplate: "/api/v4/projects/{id}/repository/branches"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author_email"
          - "$..committer_email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..message"
          - "$..title"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Branch"
  - pathTemplate: "/api/v4/projects/{id}/repository/commits"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author_email"
          - "$..committer_email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..message"
          - "$..title"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Commit"
  - pathTemplate: "/api/v4/projects/{id}/repository/commits/{sha}"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..author_email"
          - "$..committer_email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..message"
          - "$..title"
    responseSchema:
      type: "object"
      properties:
        author_email:
          type: "string"
        authored_date:
          type: "string"
          format: "date-time"
        committed_date:
          type: "string"
          format: "date-time"
        committer_email:
          type: "string"
        created_at:
          type: "string"
          format: "date-time"
        id:
          type: "string"
        message:
          type: "string"
        parent_ids:
          type: "array"
          items:
            type: "string"
        project_id:
          type: "integer"
        short_id:
          type: "string"
        sourceId:
          type: "string"
        stats:
          $ref: "#/definitions/Stats"
        status:
          type: "string"
        title:
          type: "string"
  - pathTemplate: "/api/v4/projects/{id}/repository/commits/{sha}/discussions"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].notes[*].author.id"
          - "$[*]..username"
          - "$[*]..email"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$[*]..body"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/CommitDiscussion"
  - pathTemplate: "/api/v4/projects/{projectId}/issues"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author.id"
          - "$[*]..username"
          - "$[*].assignee.id"
          - "$[*].assignees[*].id"
          - "$[*].closed_by.id"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..description"
          - "$..title"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/Issue"
  - pathTemplate: "/api/v4/projects/{projectId}/merge_requests"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].author.id"
          - "$[*]..username"
          - "$[*].assignee.id"
          - "$[*].assignees[*].id"
          - "$[*].reviewers[*].id"
          - "$[*].merged_by.id"
          - "$[*].merge_user.id"
          - "$[*].closed_by.id"
        encoding: "URL_SAFE_TOKEN"
      - !<textDigest>
        jsonPaths:
          - "$..title"
          - "$..description"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/MergeRequest"
  - pathTemplate: "/api/v4/users"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$[*].id"
          - "$[*].username"
          - "$[*].email"
        encoding: "URL_SAFE_TOKEN"
    responseSchema:
      type: "array"
      items:
        $ref: "#/definitions/User"
definitions:
  AuditEvent:
    type: "object"
    properties:
      author_id:
        type: "integer"
      created_at:
        type: "string"
        format: "date-time"
      details:
        $ref: "#/definitions/Details"
      entity_id:
        type: "integer"
      entity_type:
        type: "string"
      id:
        type: "integer"
  Branch:
    type: "object"
    properties:
      can_push:
        type: "boolean"
      commit:
        $ref: "#/definitions/Commit"
      default:
        type: "boolean"
      developers_can_merge:
        type: "boolean"
      developers_can_push:
        type: "boolean"
      merged:
        type: "boolean"
      name:
        type: "string"
      protected:
        type: "boolean"
      sourceId:
        type: "string"
  Commit:
    type: "object"
    properties:
      author_email:
        type: "string"
      authored_date:
        type: "string"
        format: "date-time"
      committed_date:
        type: "string"
        format: "date-time"
      committer_email:
        type: "string"
      created_at:
        type: "string"
        format: "date-time"
      id:
        type: "string"
      message:
        type: "string"
      parent_ids:
        type: "array"
        items:
          type: "string"
      project_id:
        type: "integer"
      short_id:
        type: "string"
      sourceId:
        type: "string"
      stats:
        $ref: "#/definitions/Stats"
      status:
        type: "string"
      title:
        type: "string"
  CommitDiscussion:
    type: "object"
    properties:
      id:
        type: "string"
      individual_note:
        type: "boolean"
      notes:
        type: "array"
        items:
          $ref: "#/definitions/Note"
  Details:
    type: "object"
    properties:
      add:
        type: "string"
      author_email:
        type: "string"
      change:
