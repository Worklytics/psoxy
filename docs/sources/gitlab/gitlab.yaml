        type: "string"
      head_sha:
        type: "string"
      start_sha:
        type: "string"
  Group:
    type: "object"
    properties:
      id:
        type: "integer"
      name:
        type: "string"
  GroupMember:
    type: "object"
    properties:
      created_at:
        type: "string"
        format: "date-time"
      created_by:
        $ref: "#/definitions/User"
      email:
        type: "string"
      expires_at:
        type: "string"
      group_saml_identity:
        $ref: "#/definitions/GroupSamlIdentity"
      id:
        type: "integer"
      is_using_seat:
        type: "boolean"
      state:
        type: "string"
      username:
        type: "string"
  GroupSamlIdentity:
    type: "object"
    properties:
      extern_uid:
        type: "string"
      provider:
        type: "string"
      saml_provider_id:
        type: "integer"
  Issue:
    type: "object"
    properties:
      assignee:
        $ref: "#/definitions/User"
      assignees:
        type: "array"
        items:
          $ref: "#/definitions/User"
      author:
        $ref: "#/definitions/User"
      closed_at:
        type: "string"
        format: "date-time"
      closed_by:
        $ref: "#/definitions/User"
      confidential:
        type: "boolean"
      created_at:
        type: "string"
        format: "date-time"
      description:
        type: "string"
      discussion_locked:
        type: "boolean"
      downvotes:
        type: "integer"
      has_tasks:
        type: "boolean"
      id:
        type: "integer"
      iid:
        type: "integer"
      issue_type:
        type: "string"
      merge_requests_count:
        type: "integer"
      milestone:
        $ref: "#/definitions/Milestone"
      project_id:
        type: "integer"
      severity:
        type: "string"
      sourceId:
        type: "string"
      state:
        type: "string"
      task_completion_status:
        $ref: "#/definitions/TaskCompletionStatus"
      time_stats:
        $ref: "#/definitions/TimeStats"
      title:
        type: "string"
      type:
        type: "string"
      updated_at:
        type: "string"
        format: "date-time"
      upvotes:
        type: "integer"
      user_notes_count:
        type: "integer"
      weight:
        type: "integer"
  MergeRequest:
    type: "object"
    properties:
      assignee:
        $ref: "#/definitions/User"
      assignees:
        type: "array"
        items:
          $ref: "#/definitions/User"
      author:
        $ref: "#/definitions/User"
      blocking_discussions_resolved:
        type: "boolean"
      changes_count:
        type: "integer"
      closed_at:
        type: "string"
        format: "date-time"
      closed_by:
        $ref: "#/definitions/User"
      created_at:
        type: "string"
        format: "date-time"
      description:
        type: "string"
      detailed_merge_status:
        type: "string"
      diff_refs:
        $ref: "#/definitions/DiffRefs"
      discussion_locked:
        type: "boolean"
      downvotes:
        type: "integer"
      draft:
        type: "boolean"
      has_conflicts:
        type: "boolean"
      id:
        type: "integer"
      iid:
        type: "integer"
      merge_commit_sha:
        type: "string"
      merge_user:
        $ref: "#/definitions/User"
      merged_at:
        type: "string"
        format: "date-time"
      merged_by:
        $ref: "#/definitions/User"
      milestone:
        $ref: "#/definitions/Milestone"
      overflow:
        type: "boolean"
      project_id:
        type: "integer"
      reviewers:
        type: "array"
        items:
          $ref: "#/definitions/User"
      sha:
