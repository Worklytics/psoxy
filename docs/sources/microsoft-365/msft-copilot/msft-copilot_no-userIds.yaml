---
endpoints:
  - pathRegex: "^/beta/copilot/users/(/p~[a-zA-Z0-9_-]+?)?[^/]*/interactionHistory/getAllEnterpriseInteractions(\\\
    ?.*)?"
    augments:
      - !<textDigest>
        jsonPaths:
          - "$..attachments[*].content"
        innerJsonPath: "$..text"
      - !<textDigest>
        jsonPaths:
          - "$..body.content"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$..emailAddress"
        encoding: "URL_SAFE_TOKEN"
      - !<tokenize>
        jsonPaths:
          - "$..sessionId"
          - "$..attachments[*].attachmentId"
      - !<tokenize>
        jsonPaths:
          - "$.['@odata.nextLink', '@odata.prevLink', 'sessions@odata.nextLink']"
        regex: "^https://graph.microsoft.com/beta/copilot/users/([a-zA-Z0-9_-]+)/.*$"
      - !<pseudonymize>
        jsonPaths:
          - "$..from..[?(@.applicationIdentityType != \"bot\")].id"
          - "$..mentions[*][?(@.applicationIdentityType != \"bot\")].id"
        encoding: "URL_SAFE_TOKEN"
      - !<redact>
        jsonPaths:
          - "$..body.content"
          - "$..attachments[*].content"
      - !<redact>
        jsonPaths:
          - "$..displayName"
          - "$..contentUrl"
          - "$..attachments[*].name"
          - "$..attachments[*].contentUrl"
          - "$..mentions[*].mentionText"
          - "$..contexts[*].contextReference"
          - "$..links[?(@.linkType == 'File')].linkUrl"
          - "$..['@odata.context']"
          - "$..['@odata.count']"
          - "$..['@odata.type']"
  - pathRegex: "^/v1.0/users(/p~[a-zA-Z0-9_-]+?)?[^/]*"
    allowedQueryParams:
      - "$top"
      - "$select"
      - "$skiptoken"
      - "$orderBy"
      - "$count"
    transforms:
      - !<pseudonymizeRegexMatches>
        jsonPaths:
          - "$..proxyAddresses[*]"
        regex: "(?i)^smtp:(.*)$"
      - !<redact>
        jsonPaths:
          - "$..displayName"
          - "$..aboutMe"
          - "$..mySite"
          - "$..preferredName"
          - "$..givenName"
          - "$..surname"
          - "$..jobTitle"
          - "$..mailNickname"
          - "$..responsibilities"
          - "$..skills"
          - "$..faxNumber"
          - "$..mobilePhone"
          - "$..businessPhones[*]"
          - "$..onPremisesExtensionAttributes"
          - "$..onPremisesSecurityIdentifier"
          - "$..securityIdentifier"
      - !<pseudonymize>
        jsonPaths:
          - "$..employeeId"
          - "$..userPrincipalName"
          - "$..imAddresses[*]"
          - "$..mail"
          - "$..otherMails[*]"
          - "$..onPremisesSamAccountName"
          - "$..onPremisesUserPrincipalName"
          - "$..onPremisesDistinguishedName"
          - "$..onPremisesImmutableId"
          - "$..identities[*].issuerAssignedId"
        encoding: "URL_SAFE_TOKEN"
      - !<pseudonymize>
        jsonPaths:
          - "$..id"
        includeReversible: true
        encoding: "URL_SAFE_TOKEN"
