---
endpoints:
  - pathTemplate: "/admin/reports/v1/activity/users/{userKey}/applications/meet"
    allowedQueryParams:
      - "customerId"
      - "maxResults"
      - "pageToken"
      - "startTime"
      - "endTime"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$.items[*].actor.email"
          - "$.items[*].resourceDetails[*]..email"
          - "$.items[*].events[*].parameters[?(@.name=='organizer_email')].value"
          - "$.items[*].events[*].parameters[?(@.name=='identifier')].value"
        encoding: "URL_SAFE_TOKEN"
      - !<hashIp>
        jsonPaths:
          - "$.items[*].ipAddress"
          - "$.items[*].events[*].parameters[?(@.name=='ip_address')].value"
      - !<redact>
        jsonPaths:
          - "$.items[*].events[*].parameters[?(@.name nin ['ip_address','organizer_email','identifier','is_external','location_country','location_region','calendar_event_id','meeting_code','conference_id','start_timestamp_seconds','duration_seconds','identifier_type'])]"
    pathParameterSchemas:
      userKey:
        or:
          - type: "string"
            enum:
              - "all"
          - type: "integer"
            pattern: "^[0-9]+$"
    responseSchema:
      type: "object"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/Activity"
        kind:
          type: "string"
        nextPageToken:
          type: "string"
definitions:
  Activity:
    type: "object"
    properties:
      actor:
        $ref: "#/definitions/Actor"
      events:
        type: "array"
        items:
          $ref: "#/definitions/Event"
      id:
        $ref: "#/definitions/Id"
      ipAddress:
        type: "string"
      resourceDetails:
        type: "array"
        items:
          $ref: "#/definitions/ResourceDetail"
  Actor:
    type: "object"
    properties:
      callerType:
        type: "string"
      email:
        type: "string"
      profileId:
        type: "string"
  Event:
    type: "object"
    properties:
      name:
        type: "string"
      parameters:
        type: "array"
        items:
          $ref: "#/definitions/Parameter"
      type:
        type: "string"
  Id:
    type: "object"
    properties:
      applicationName:
        type: "string"
      customerId:
        type: "string"
      time:
        type: "string"
        format: "date-time"
      uniqueQualifier:
        type: "string"
  Parameter:
    type: "object"
    properties:
      boolValue:
        type: "boolean"
      intValue:
        type: "string"
      name:
        type: "string"
      value:
        type: "string"
  ResourceDetail:
    type: "object"
    properties:
      id:
        type: "string"
      relation:
        type: "string"
      type:
        type: "string"
