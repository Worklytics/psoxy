      - "from"
      - "to"
      - "action"
      - "actor"
      - "ip"
      - "product"
      - "location"
      - "limit"
      - "sortOrder"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$.data[*].actor.id"
          - "$.data[*].actor.onBehalfOf.id"
          - "$.data[*].actor.onBehalfOf.email"
        encoding: "URL_SAFE_TOKEN"
