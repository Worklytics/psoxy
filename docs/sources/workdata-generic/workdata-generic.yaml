fileRules:
  # events
  /{exportId}/events{shardIndex}.ndjson:
    format: "NDJSON"
    transforms:
      - pseudonymize:
          - "$.actor.id"
          - "$.actor.identity.id"
          - "$.object.collaborators[*].id"
          - "$.object.collaborators[*].identity.id"

  # items (snapshots)
  /{exportId}/items{shardIndex}.ndjson:
    format: "NDJSON"
    transforms:
      - pseudonymize:
          - "$.collaborators[*].id"
          - "$.collaborators[*].identity.id"
          - "$.object.collaborators[*].id"
          - "$.object.collaborators[*].identity.id"

  # accounts
  /{exportId}/accounts{shardIndex}.ndjson:
    format: "NDJSON"
    transforms:
      - pseudonymize:
          - "$.accountId"
          - "$.associatedIdentities[*].id"
