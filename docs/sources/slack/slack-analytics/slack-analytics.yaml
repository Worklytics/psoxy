---
endpoints:
  - pathTemplate: "/api/admin.analytics.getFile"
    allowedQueryParams:
      - "type"
      - "date"
      - "metadata_only"
    transforms:
      - !<pseudonymize>
        jsonPaths: # these are actually NDJSON, not JSON response
          - "$.user_id"
          - "$.email_address"
        encoding: "URL_SAFE_TOKEN"
      - !<redact>
        jsonPaths: # all for public_channel case; could split into two endpoints to deal with this
          - "$.topic"
          - "$.name"
          - "$.description"
  - pathTemplate: "/api/admin.analytics.messages.metadata"
    allowedQueryParams:
      - "channel"
      - "oldest_ts"
      - "latest_ts"
      - "cursor"
      - "limit"
    transforms:
      - !<pseudonymize>
        jsonPaths:
          - "$.messages[?(@.user_id!='USLACKBOT')].user_id"
        encoding: "URL_SAFE_TOKEN"
  - pathTemplate: "/api/admin.analytics.messages.activity"
    allowedQueryParams:
      - "channel"
      - "oldest_ts"
      - "latest_ts"
      - "cursor"
      - "limit"
